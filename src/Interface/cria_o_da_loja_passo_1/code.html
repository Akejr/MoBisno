<!DOCTYPE html>

<html lang="pt"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MôBisno - Criar minha loja</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-tertiary-fixed-variant": "#404758",

                      "surface-container-high": "#ffe2d8",
                      "secondary-fixed-dim": "#c5c7c8",
                      "on-tertiary-container": "#242b3b",
                      "tertiary-container": "#8b92a6",
                      "error-container": "#ffdad6",
                      "surface-variant": "#fadcd2",
                      "on-primary-fixed-variant": "#802a00",
                      "on-secondary": "#ffffff",
                      "surface": "#fff8f6",
                      "on-primary": "#ffffff",
                      "on-secondary-container": "#626566",
                      "surface-container": "#ffe9e2",
                      "on-surface": "#271812",
                      "on-tertiary-fixed": "#141b2b",
                      "primary-fixed-dim": "#ffb59a",
                      "on-error-container": "#93000a",
                      "secondary-container": "#e1e3e4",
                      "surface-dim": "#f1d4ca",
                      "on-primary-container": "#521800",
                      "secondary-fixed": "#e1e3e4",
                      "primary-container": "#ff5c00",
                      "on-secondary-fixed-variant": "#454748",
                      "tertiary-fixed": "#dce2f7",
                      "error": "#ba1a1a",
                      "surface-bright": "#fff8f6",
                      "background": "#fff8f6",
                      "surface-container-lowest": "#ffffff",
                      "inverse-on-surface": "#ffede7",
                      "primary-fixed": "#ffdbce",
                      "inverse-surface": "#3e2c26",
                      "secondary": "#5c5f60",
                      "on-tertiary": "#ffffff",
                      "on-surface-variant": "#5b4137",
                      "tertiary": "#575e70",
                      "primary": "#a73a00",
                      "outline": "#8f7065",

              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",

                      "full": "9999px"
              },
              "spacing": {

                      "container-max": "1280px",

              },
              "fontFamily": {

          }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined[data-weight="fill"] {
            font-variation-settings: 'FILL' 1;
        }
        
        /* Subtle animation for the wizard entrance */
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-entrance {
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Suppressed TopNavBar per intent rules (Linear/Transactional Onboarding) -->
<!-- Minimal Header for context -->
<header class="w-full py-6 px-margin-mobile md:px-margin-desktop flex justify-center items-center">
<a aria-label="MôBisno Home" class="font-display-lg text-primary font-bold tracking-tight inline-flex items-center gap-2" href="#">
<!-- Simplified Logo Representation based on Brand Image -->
<svg aria-hidden="true" class="text-primary" fill="none" height="40" viewbox="0 0 100 100" width="40" xmlns="http://www.w3.org/2000/svg">
<path d="M20 80 L50 30 L80 80" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="12"></path>
<path d="M35 60 L65 60" stroke="currentColor" stroke-linecap="round" stroke-width="12"></path>
</svg>
            MôBisno
        </a>
</header>
<main class="flex-grow flex items-center justify-center p-margin-mobile md:p-margin-desktop">
<div class="w-full max-w-2xl bg-surface-container-lowest rounded-xl shadow-lg border border-outline-variant p-8 md:p-12 animate-entrance relative overflow-hidden">
<!-- Progress Bar -->
<div class="absolute top-0 left-0 w-full h-1 bg-surface-variant">
<div class="h-full bg-primary transition-all duration-500 ease-in-out" style="width: 16.66%;"></div> <!-- 1/6 -->
</div>
<!-- Header -->
<div class="mb-stack-lg text-center">
<div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-primary-container text-on-primary-container mb-4">
<span class="material-symbols-outlined" data-icon="store">store</span>
</div>
<h1 class="font-headline-lg-mobile md:font-headline-lg text-on-surface mb-2">Dados da Loja</h1>
<p class="text-on-surface-variant">Etapa 1 de 6 — Vamos dar vida à sua ideia.</p>
</div>
<!-- Form -->
<form action="#" class="space-y-stack-md" method="POST">
<!-- Nome da Loja -->
<div class="space-y-stack-sm">
<label class="block font-label-md text-on-surface" for="store_name">Nome da loja</label>
<input class="w-full bg-surface text-on-surface border border-outline rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-shadow font-body-md placeholder:text-on-surface-variant/50" id="store_name" name="store_name" placeholder="Ex: Roupas de Angola" required="" type="text"/>
<p class="font-label-sm text-on-surface-variant">Este será o nome principal que seus clientes verão.</p>
</div>
<!-- Tipo de Negócio -->
<div class="space-y-stack-sm">
<label class="block font-label-md text-on-surface" for="business_type">Tipo de negócio</label>
<div class="relative">
<select class="w-full bg-surface text-on-surface border border-outline rounded-lg px-4 py-3 appearance-none focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-shadow font-body-md" id="business_type" name="business_type" required="">
<option disabled="" selected="" value="">Selecione uma categoria...</option>
<option value="moda">Moda e Vestuário</option>
<option value="eletronicos">Eletrônicos e Tecnologia</option>
<option value="beleza">Beleza e Cosméticos</option>
<option value="alimentos">Alimentos e Bebidas</option>
<option value="artesanato">Artesanato e Decoração</option>
<option value="servicos">Serviços</option>
<option value="outro">Outro</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
<!-- Subdomínio Desejado -->
<div class="space-y-stack-sm pt-stack-sm">
<label class="block font-label-md text-on-surface" for="subdomain">Subdomínio desejado</label>
<div class="flex rounded-lg shadow-sm border border-outline focus-within:ring-2 focus-within:ring-primary focus-within:border-primary overflow-hidden transition-shadow">
<input class="flex-1 min-w-0 block w-full px-4 py-3 border-none bg-surface text-on-surface font-body-md focus:ring-0 placeholder:text-on-surface-variant/50 text-right" id="subdomain" name="subdomain" placeholder="nomedaloja" required="" type="text"/>
<span class="inline-flex items-center px-4 rounded-r-lg bg-surface-variant text-on-surface-variant font-label-md select-none border-l border-outline">
                            .mobisno.com
                        </span>
</div>
<p class="font-label-sm text-on-surface-variant flex items-center gap-1 mt-1">
<span class="material-symbols-outlined text-[14px]" data-icon="info">info</span>
                        Você poderá adicionar um domínio próprio (ex: sua-loja.ao) mais tarde.
                    </p>
</div>
<!-- Actions -->
<div class="pt-stack-lg flex justify-end">
<button class="inline-flex items-center justify-center gap-2 bg-primary text-on-primary font-label-md font-bold py-3 px-8 rounded-full shadow-md hover:bg-surface-tint hover:shadow-lg transition-all active:scale-95" type="submit">
                        Próximo
                        <span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
</div>
</main>
<!-- Suppressed Footer per intent rules (Linear/Transactional Onboarding) -->
</body></html>
